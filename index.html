<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Smart Price Finder 🔥</title>

<!-- ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
    text-align: center;
}

/* HEADER */
h1 {
    margin-top: 20px;
}

/* SEARCH BOX */
.search-box {
    margin: 20px;
}

input {
    padding: 12px;
    width: 60%;
    border-radius: 12px;
    border: none;
    outline: none;
}

button {
    padding: 12px 20px;
    border-radius: 12px;
    border: none;
    background: #22c55e;
    color: white;
    cursor: pointer;
    font-weight: bold;
}

/* CARDS */
.card {
    background: #1e293b;
    margin: 15px;
    padding: 15px;
    border-radius: 20px;
    display: inline-block;
    width: 250px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #22c55e;
}

img {
    width: 120px;
    border-radius: 10px;
}

a {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 15px;
    background: #3b82f6;
    border-radius: 10px;
    color: white;
    text-decoration: none;
}

/* ADVICE */
#advice {
    margin-top: 20px;
    font-size: 22px;
}
</style>
</head>

<body>

<h1><i class="fa-solid fa-bolt"></i> Smart Price Finder</h1>

<div class="search-box">
    <input id="search" placeholder="🔍 اكتب المنتج بالعربي أو English">
    <button onclick="search()">
        <i class="fa-solid fa-magnifying-glass"></i> Search
    </button>
</div>

<h2 id="advice"></h2>

<div id="results"></div>

<script>
async function search() {
    let q = document.getElementById("search").value;

    let res = await fetch(`/search?q=${q}`);
    let data = await res.json();

    let results = document.getElementById("results");
    results.innerHTML = "";

    document.getElementById("advice").innerHTML =
        `<i class="fa-solid fa-brain"></i> ${data.advice}`;

    data.products.forEach(p => {
        results.innerHTML += `
        <div class="card">
            <img src="${p.image}">
            <h3><i class="fa-solid fa-box"></i> ${p.name}</h3>
            <p><i class="fa-solid fa-dollar-sign"></i> ${p.price}</p>

            <a href="${p.link}" target="_blank">
                <i class="fa-solid fa-cart-shopping"></i> اشتري
            </a>
        </div>
        `;
    });
}
</script>

</body>
</html>
