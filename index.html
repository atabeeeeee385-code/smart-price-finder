<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Smart Price Finder</title>

<style>
body {
    background: #050816;
    color: white;
    font-family: Arial;
    text-align: center;
}

/* Cyber Box */
.cyber-box {
    margin: 20px auto;
    padding: 20px;
    border: 1px solid #00fff7;
    box-shadow: 0 0 20px #00fff7, 0 0 40px #ff00ff;
    width: fit-content;
}

.cyber-name {
    color: #00fff7;
    text-shadow: 0 0 10px #00fff7, 0 0 20px #ff00ff;
}

/* Inputs */
input {
    padding: 10px;
    width: 60%;
    border-radius: 10px;
}

button {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    cursor: pointer;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
    gap: 15px;
    margin-top: 20px;
}

.card {
    background: #111827;
    padding: 10px;
    border-radius: 10px;
}

img {
    width: 100%;
}
</style>
</head>

<body>

<h1>⚡ Smart Price Finder</h1>

<div class="cyber-box">
    <div>DEVELOPER</div>
    <h2 class="cyber-name">ABDALLAH BADAWY</h2>
</div>

<input id="searchBox" placeholder="ابحث...">
<button onclick="search()">بحث</button>
<button onclick="showCheapest()">⭐ أرخص</button>
<button onclick="showSaved()">❤️ محفوظ</button>

<h2 id="advice"></h2>

<div class="grid" id="results"></div>

<script>
let allProducts = []
let saved = []

function search() {
    let q = document.getElementById("searchBox").value

    fetch(`/search?q=${q}`)
    .then(res => res.json())
    .then(data => {

        document.getElementById("advice").innerText = data.advice

        allProducts = data.products

        display(allProducts)

        if (data.cheapest && data.cheapest.price_egp < 15000) {
            alert("🔥 عرض جامد!")
        }
    })
}

function display(products) {
    let html = ""
    products.forEach(p => {
        html += `
        <div class="card">
            <img src="${p.image}">
            <h4>${p.title}</h4>
            <p>${p.price_egp} جنيه</p>

            <button onclick='save(${JSON.stringify(p)})'>❤️ حفظ</button>
            <a href="${p.link}" target="_blank">🛒 شراء</a>
        </div>
        `
    })
    document.getElementById("results").innerHTML = html
}

function showCheapest() {
    if (allProducts.length) {
        display([allProducts[0]])
    }
}

function save(p) {
    saved.push(p)
    alert("تم الحفظ ❤️")
}

function showSaved() {
    display(saved)
}
</script>

</body>
</html>
