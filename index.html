<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Smart Price Finder</title>

<style>
body {
    background: #050816;
    color: white;
    font-family: Arial;
    text-align: center;
}

/* Cyber Developer Box */
.cyber-box {
    margin: 20px auto;
    padding: 20px;
    border: 1px solid #00fff7;
    box-shadow: 0 0 20px #00fff7, 0 0 40px #ff00ff;
    width: fit-content;
}

.cyber-name {
    color: #00fff7;
    text-shadow: 0 0 10px #00fff7, 0 0 20px #ff00ff;
}

/* Inputs */
input, select {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
}

button {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    cursor: pointer;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
    gap: 15px;
    margin-top: 20px;
}

.card {
    background: #111827;
    padding: 10px;
    border-radius: 10px;
}

img {
    width: 100%;
    height: 150px;
    object-fit: contain;
}
</style>
</head>

<body>

<h1>⚡ Smart Price Finder</h1>

<div class="cyber-box">
    <div>DEVELOPER</div>
    <h2 class="cyber-name">ABDALLAH BADAWY</h2>
</div>

<input id="searchInput" placeholder="اكتب أي حاجة...">
<button onclick="search()">بحث</button>

<br>

<input id="min" placeholder="اقل سعر">
<input id="max" placeholder="اعلى سعر">

<select id="sort">
  <option value="">ترتيب</option>
  <option value="cheap">الأرخص</option>
  <option value="expensive">الأغلى</option>
</select>

<h2 id="advice"></h2>

<div class="grid" id="results"></div>

<script>
let products = []

async function search() {
    let q = document.getElementById("searchInput").value
    let min = document.getElementById("min").value
    let max = document.getElementById("max").value
    let sort = document.getElementById("sort").value

    let res = await fetch(`/search?q=${q}&min=${min}&max=${max}&sort=${sort}`)
    let data = await res.json()

    products = data.products
    document.getElementById("advice").innerText = data.advice

    show(products)
}

function show(list) {
    let html = ""

    list.forEach(p => {
        html += `
        <div class="card">
            <img src="${p.image}">
            <h4>${p.title}</h4>
            <p>${p.price}</p>

            <a href="${p.link}" target="_blank">🛒 شراء</a>
        </div>
        `
    })

    document.getElementById("results").innerHTML = html
}
</script>

</body>
</html>
