<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Smart Price Finder</title>

<style>
body {
    font-family: Arial;
    background: #0b1220;
    color: white;
    text-align: center;
}

input {
    width: 60%;
    padding: 12px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 12px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin: 5px;
}

.search-btn { background: green; color: white; }
.cheapest-btn { background: orange; }

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 15px;
    margin-top: 20px;
}

.card {
    background: #1b2335;
    padding: 10px;
    border-radius: 15px;
}

img {
    width: 100%;
    border-radius: 10px;
}

</style>
</head>

<body>

<h1>⚡ Smart Price Finder</h1>

<input id="searchBox" placeholder="ابحث...">
<button class="search-btn" onclick="search()">بحث</button>
<button class="cheapest-btn" onclick="showCheapest()">أرخص منتج</button>

<h2 id="advice"></h2>

<div class="grid" id="results"></div>

<script>
let savedProducts = [];
let cheapestProduct = null;

function search() {
    let q = document.getElementById("searchBox").value;

    fetch(`/search?q=${q}`)
    .then(res => res.json())
    .then(data => {

        document.getElementById("advice").innerText = data.advice;

        cheapestProduct = data.cheapest;

        let html = "";

        data.products.forEach(p => {
            html += `
            <div class="card">
                <img src="${p.image}">
                <h4>${p.title}</h4>
                <p>${p.price}</p>

                <button onclick='saveProduct(${JSON.stringify(p)})'>⭐ حفظ</button>
                <a href="${p.link}" target="_blank">
                    <button>🛒 اشتري</button>
                </a>
            </div>
            `;
        });

        document.getElementById("results").innerHTML = html;
    });
}

function showCheapest() {
    if (!cheapestProduct) return alert("اعمل بحث الأول");

    alert("أرخص منتج:\n" + cheapestProduct.title + "\n" + cheapestProduct.price);
}

function saveProduct(p) {
    savedProducts.push(p);
    alert("تم الحفظ ⭐");
}

// 🔔 تنبيه
setInterval(() => {
    if (savedProducts.length > 0) {
        console.log("عندك منتجات محفوظة 🔔");
    }
}, 10000);
</script>

</body>
</html>
