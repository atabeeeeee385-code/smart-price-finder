<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Price Finder</title>

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
}

/* Header */
.header {
    text-align: center;
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
}

/* Search */
.search-box {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
}

input {
    width: 60%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: #22c55e;
    color: white;
    cursor: pointer;
}

/* Advice */
#advice {
    text-align: center;
    margin: 15px;
    font-size: 18px;
}

/* Grid */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* Card */
.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 15px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: contain;
}

.title {
    font-size: 14px;
    margin: 10px 0;
    min-height: 40px;
}

.price {
    color: #22c55e;
    font-weight: bold;
}

.buy {
    margin-top: 10px;
    display: inline-block;
    background: #3b82f6;
    padding: 8px 15px;
    border-radius: 10px;
    color: white;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="header">
    ⚡ Smart Price Finder
</div>

<div class="search-box">
    <input id="searchInput" placeholder="ابحث عن منتج...">
    <button onclick="search()">
        <i class="fa fa-search"></i> Search
    </button>
</div>

<div id="advice"></div>

<div class="products" id="products"></div>

<script>
async function search() {
    const query = document.getElementById("searchInput").value;

    const res = await fetch(`/search?q=${query}`);
    const data = await res.json();

    const container = document.getElementById("products");
    container.innerHTML = "";

    document.getElementById("advice").innerText = data.advice || "";

    data.products.forEach(p => {

        const title = p.title || "منتج بدون اسم";
        const price = p.price || "السعر غير متوفر";
        const image = p.image || "https://via.placeholder.com/200";
        const link = p.link || "#";

        container.innerHTML += `
        <div class="card">
            <img src="${image}">
            <div class="title"><i class="fa fa-box"></i> ${title}</div>
            <div class="price"><i class="fa fa-dollar-sign"></i> ${price}</div>
            <a class="buy" href="${link}" target="_blank">
                <i class="fa fa-cart-shopping"></i> اشتري
            </a>
        </div>
        `;
    });
}
</script>

</body>
</html>
